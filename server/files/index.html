<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies! - Übung 4</title>
  <link rel="stylesheet" href="index.css" />
  <!-- type=module ist zwingend erforderlich für die builders.js Imports -->
  <script type="module" src="index.js"></script>
</head>
<body>
<header>
  <h1>Movies!</h1>
  <!-- Task 1.2: Anzeige für Name und Login-Zeitpunkt -->
  <div id="userGreeting" class="user-greeting"></div>
</header>

<nav>
  <h2>Genres</h2>
  <ul id="filter">
    <!-- Wird dynamisch durch index.js befüllt -->
  </ul>

  <h2>Manage</h2> <!-- Beschriftung angepasst an image_792794.jpg -->
  <ul>
    <li>
      <!-- Button für Task 2.1: Wird erst nach Login sichtbar -->
      <button id="addMoviesBtn" style="display: none;">Add movies</button>
    </li>
    <li>
      <!-- Button für Task 1.1 / 1.3 -->
      <button id="authBtn">Login</button>
    </li>
  </ul>
</nav>

<main>
  <!-- Hier rendert der MovieBuilder die Filmkarten -->
</main>

<!-- Task 1.1: Login Dialog -->
<dialog id="loginDialog">
  <form id="loginForm" method="dialog">
    <h3>Login</h3>
    <div>
      <label for="username">Benutzername:</label>
      <input type="text" id="username" name="username" required>
    </div>
    <div>
      <label for="password">Passwort:</label>
      <input type="password" id="password" name="password" required>
    </div>
    <div class="dialog-buttons">
      <button type="submit">Anmelden</button>
      <button type="button" id="cancelLogin">Abbrechen</button>
    </div>
  </form>
</dialog>

<!-- Task 2.1: Search Dialog (OMDb API) -->
<dialog id="searchDialog">
  <div class="dialog-content">
    <form id="searchForm">
      <label for="query">Search for movies:</label>
      <input type="text" id="query" placeholder="Titel..." required>
      <button type="submit">Search</button>
      <button type="button" id="cancelSearch">Cancel</button>
    </form>
    <hr>
    <!-- Task 2.2: Container für die Suchergebnisse -->
    <div id="searchResults"></div>
  </div>
</dialog>

<footer>
  <!-- Zentrierter Text via CSS -->
  <p>&copy; 2026 Movies! &mdash; Management System</p>
</footer>

</body>
</html>
